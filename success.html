<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message sent — Ally Naylor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #2a9d9d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #f5f0e8;
      border-radius: 16px;
      padding: 4rem 3rem;
      max-width: 520px;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: #1e5c5c;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    p {
      font-size: 1rem;
      line-height: 1.7;
      color: #6b6b6b;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #e8604c;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: #c44a38; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">👋</div>
    <h1>Ngā Mihi!</h1>
    <p>I'll be in touch soon.</p>
    <a href="/">← Back to allynaylor.com</a>

</body>
</html>
